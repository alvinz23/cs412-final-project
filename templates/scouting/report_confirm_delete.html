{% extends 'base.html' %}

{% block content %}
<h1 class="h3 mb-3">Delete Scouting Report</h1>
<form method="post" class="card card-body shadow-sm">
    {% csrf_token %}
    <p>Delete this scouting report for <strong>{{ object.player }}</strong>?</p>
    <button class="btn btn-danger" type="submit">Confirm Delete</button>
</form>
{% endblock %}
