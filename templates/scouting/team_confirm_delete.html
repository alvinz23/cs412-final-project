{% extends 'base.html' %}

{% block content %}
<h1 class="h3 mb-3">Delete Team</h1>
<form method="post" class="card card-body shadow-sm">
    {% csrf_token %}
    <p>Delete <strong>{{ object.name }}</strong>? This also deletes linked players and reports.</p>
    <button class="btn btn-danger" type="submit">Confirm Delete</button>
</form>
{% endblock %}
