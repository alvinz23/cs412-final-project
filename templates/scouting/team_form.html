{% extends 'base.html' %}

{% block title %}{% if form.instance.pk %}Edit Team{% else %}Add Team{% endif %}{% endblock %}

{% block content %}
<h1 class="h3 mb-3">{% if form.instance.pk %}Edit Team{% else %}Add Team{% endif %}</h1>
<form method="post" class="card card-body shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% if form.instance.pk %}{% url 'team-detail' form.instance.pk %}{% else %}{% url 'team-list' %}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
